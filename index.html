<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Familiar - SCDJVJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-[#003366] p-8 text-center text-white">
                <img src="logo.jpg" alt="Logo" class="h-20 w-20 mx-auto mb-4 bg-white rounded-full p-2 object-contain">
                <h1 class="text-xl font-bold uppercase">Ficha de Identidad Familiar</h1>
                <p class="text-xs italic mt-2">"Hacemos de tu familia en comunidad, un espacio para la santidad."</p>
            </div>

            <form id="n8nForm" class="p-8 space-y-6">
                <div class="space-y-4">
                    <h2 class="text-[#D32F2F] font-bold border-b pb-1 text-sm uppercase">1. Identidad de los Esposos</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" name="nombre_el" placeholder="Nombre y Apellidos (Él) [cite: 4]" class="border-b-2 p-2 outline-none focus:border-[#003366] w-full" required>
                        <input type="text" name="nombre_ella" placeholder="Nombre y Apellidos (Ella) [cite: 5]" class="border-b-2 p-2 outline-none focus:border-[#003366] w-full" required>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" name="comunidad" placeholder="Comunidad a la que pertenece [cite: 9]" class="border-b-2 p-2 outline-none focus:border-[#003366] w-full" required>
                        <div class="flex flex-col">
                            <label class="text-[10px] text-gray-400 font-bold uppercase">Aniversario Boda [cite: 10]</label>
                            <input type="date" name="aniversario" class="border-b-2 p-2 outline-none focus:border-[#003366]">
                        </div>
                    </div>
                    <input type="tel" name="whatsapp" placeholder="WhatsApp [cite: 11]" class="border-b-2 p-2 outline-none focus:border-[#003366] w-full" required>
                </div>

                <div class="space-y-4">
                    <h2 class="text-[#D32F2F] font-bold border-b pb-1 text-sm uppercase">2. Identidad de los Hijos</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" name="hijo1_nombre" placeholder="Nombre Hijo 1 [cite: 13]" class="border-b-2 p-2 text-sm outline-none">
                        <input type="date" name="hijo1_cumple" class="border-b-2 p-2 text-sm outline-none">
                        <input type="text" name="hijo2_nombre" placeholder="Nombre Hijo 2 [cite: 16]" class="border-b-2 p-2 text-sm outline-none">
                        <input type="date" name="hijo2_cumple" class="border-b-2 p-2 text-sm outline-none">
                    </div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-[#D32F2F] font-bold border-b pb-1 text-sm uppercase">3. Núcleo Familiar</h2>
                    <textarea name="lema" placeholder="Lema de la Familia [cite: 23]" class="border-2 p-3 w-full rounded-xl text-sm italic h-20 outline-none focus:border-[#003366]"></textarea>
                    
                    <div class="space-y-2">
                        <label class="block text-[10px] font-bold text-gray-500 uppercase">Foto Familiar Completa [cite: 18]</label>
                        <input type="file" name="foto_familia" accept="image/*" class="text-xs">
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-[#003366] text-white py-4 rounded-2xl font-bold uppercase shadow-lg hover:bg-blue-900 transition-all">
                    <span id="btnText">Enviar a la Pastoral</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('n8nForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const txt = document.getElementById('btnText');
            btn.disabled = true;
            txt.innerText = "Enviando...";

            const formData = new FormData(e.target);
            
            // PEGA AQUÍ TU URL DE n8n [Webhook]
            const WEBHOOK_URL = 'TU_URL_DE_N8N_AQUI';

            try {
                const response = await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
                if (response.ok) {
                    alert('¡Recibido! Sus datos se han guardado en la base de la Pastoral.');
                    e.target.reset();
                }
            } catch (err) {
                alert('Error de conexión.');
            } finally {
                btn.disabled = false;
                txt.innerText = "Enviar a la Pastoral";
            }
        });
    </script>
</body>
</html>
